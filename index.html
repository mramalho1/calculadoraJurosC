<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Financeira de Juros Compostos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .calculadora {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .grupo-input {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
        }
        select.principal {
            background-color: #eef2f5;
            font-weight: bold;
            color: #0056b3;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #d4edda;
            color: #155724;
            border-radius: 5px;
            display: none;
            font-size: 18px;
            text-align: center;
        }
        .erro {
            color: #721c24;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
        hr {
            border: 0; 
            border-top: 1px solid #eee; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <h2>Calculadora Financeira</h2>
        
        <label for="tipoCalculo">O que você deseja calcular?</label>
        <select id="tipoCalculo" class="principal" onchange="atualizarFormulario()">
            <option value="montante">Montante (Valor Final)</option>
            <option value="capital">Capital Inicial</option>
            <option value="taxa">Taxa de Juros (Geral)</option>
            <option value="tempo">Tempo (Períodos)</option>
            <option value="equivalencia">Equivalência de Taxas</option>
        </select>
        
        <hr>

        <div id="secao-valores">
            <div class="grupo-input" id="div-montante" style="display: none;">
                <label for="montante">Montante Final (R$):</label>
                <input type="number" id="montante" placeholder="Ex: 1500.00" step="0.01">
            </div>

            <div class="grupo-input" id="div-capital">
                <label for="capital">Capital Inicial (R$):</label>
                <input type="number" id="capital" placeholder="Ex: 1000.00" step="0.01">
            </div>
            
            <div class="grupo-input" id="div-taxa">
                <label for="taxa">Taxa de Juros (% por período):</label>
                <input type="number" id="taxa" placeholder="Ex: 1.5" step="0.01">
            </div>
            
            <div class="grupo-input" id="div-tempo">
                <label for="tempo">Tempo (Quantidade de períodos):</label>
                <input type="number" id="tempo" placeholder="Ex: 12">
            </div>
        </div>

        <div id="secao-equivalencia" style="display: none;">
            <div class="grupo-input">
                <label for="taxa-informada">Taxa Informada (%):</label>
                <input type="number" id="taxa-informada" placeholder="Ex: 2.5" step="0.01">
            </div>
            <div class="grupo-input">
                <label for="tipo-conversao">Tipo de Conversão:</label>
                <select id="tipo-conversao">
                    <option value="m_a">De Mensal para Anual</option>
                    <option value="a_m">De Anual para Mensal</option>
                    <option value="m_b">De Mensal para Bimestral</option>
                    <option value="b_m">De Bimestral para Mensal</option>
                    <option value="m_d">De Mensal para Diário (30 dias)</option>
                    <option value="d_m">De Diário para Mensal (30 dias)</option>
                </select>
            </div>
        </div>
        
        <button onclick="calcular()">Calcular</button>
        
        <div id="mensagem-erro" class="erro"></div>
        <div class="resultado" id="resultado-box"></div>
    </div>

    <script>
        function atualizarFormulario() {
            const tipo = document.getElementById('tipoCalculo').value;
            
            // Controle de visibilidade das seções principais
            const secaoValores = document.getElementById('secao-valores');
            const secaoEquiv = document.getElementById('secao-equivalencia');
            
            document.getElementById('resultado-box').style.display = 'none';
            document.getElementById('mensagem-erro').style.display = 'none';

            if (tipo === 'equivalencia') {
                secaoValores.style.display = 'none';
                secaoEquiv.style.display = 'block';
            } else {
                secaoValores.style.display = 'block';
                secaoEquiv.style.display = 'none';
                
                // Controle interno da seção de valores
                document.getElementById('div-montante').style.display = tipo !== 'montante' ? 'block' : 'none';
                document.getElementById('div-capital').style.display = tipo !== 'capital' ? 'block' : 'none';
                document.getElementById('div-taxa').style.display = tipo !== 'taxa' ? 'block' : 'none';
                document.getElementById('div-tempo').style.display = tipo !== 'tempo' ? 'block' : 'none';
            }
        }

        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        }

        function calcular() {
            const tipo = document.getElementById('tipoCalculo').value;
            const erroDiv = document.getElementById('mensagem-erro');
            const resultadoBox = document.getElementById('resultado-box');
            
            erroDiv.style.display = 'none';
            resultadoBox.style.display = 'none';

            try {
                let textoFinal = "";

                if (tipo === 'equivalencia') {
                    const taxaInf = parseFloat(document.getElementById('taxa-informada').value);
                    const conversao = document.getElementById('tipo-conversao').value;
                    
                    if (isNaN(taxaInf)) throw "Insira a taxa que deseja converter.";

                    const i = taxaInf / 100;
                    let expoente = 1;
                    let labelResultado = "";

                    // Definindo a relação de tempo (n) baseada na escolha
                    switch(conversao) {
                        case 'm_a': expoente = 12;   labelResultado = "Taxa Anual"; break;
                        case 'a_m': expoente = 1/12; labelResultado = "Taxa Mensal"; break;
                        case 'm_b': expoente = 2;    labelResultado = "Taxa Bimestral"; break;
                        case 'b_m': expoente = 1/2;  labelResultado = "Taxa Mensal"; break;
                        case 'm_d': expoente = 1/30; labelResultado = "Taxa Diária"; break;
                        case 'd_m': expoente = 30;   labelResultado = "Taxa Mensal"; break;
                    }

                    // Fórmula: [(1 + i)^n - 1] * 100
                    const taxaEquivalente = (Math.pow((1 + i), expoente) - 1) * 100;
                    textoFinal = `<strong>${labelResultado}:</strong><br>${taxaEquivalente.toFixed(4)}%`;

                } else {
                    const M = parseFloat(document.getElementById('montante').value);
                    const C = parseFloat(document.getElementById('capital').value);
                    const i = parseFloat(document.getElementById('taxa').value) / 100;
                    const t = parseFloat(document.getElementById('tempo').value);
                    let resultado = 0;

                    if (tipo === 'montante') {
                        if (isNaN(C) || isNaN(i) || isNaN(t)) throw "Preencha Capital, Taxa e Tempo.";
                        resultado = C * Math.pow((1 + i), t);
                        textoFinal = `<strong>Montante:</strong><br>${formatarMoeda(resultado)}`;
                    } 
                    else if (tipo === 'capital') {
                        if (isNaN(M) || isNaN(i) || isNaN(t)) throw "Preencha Montante, Taxa e Tempo.";
                        resultado = M / Math.pow((1 + i), t);
                        textoFinal = `<strong>Capital Inicial:</strong><br>${formatarMoeda(resultado)}`;
                    } 
                    else if (tipo === 'taxa') {
                        if (isNaN(M) || isNaN(C) || isNaN(t) || C <= 0) throw "Preencha Montante, Capital e Tempo (Capital > 0).";
                        resultado = (Math.pow(M / C, 1 / t) - 1) * 100;
                        textoFinal = `<strong>Taxa de Juros:</strong><br>${resultado.toFixed(2)}% por período`;
                    } 
                    else if (tipo === 'tempo') {
                        if (isNaN(M) || isNaN(C) || isNaN(i) || C <= 0 || i <= 0) throw "Preencha Montante, Capital e Taxa válidos.";
                        resultado = Math.log(M / C) / Math.log(1 + i);
                        textoFinal = `<strong>Tempo Necessário:</strong><br>${resultado.toFixed(2)} períodos`;
                    }
                }

                resultadoBox.innerHTML = textoFinal;
                resultadoBox.style.display = 'block';

            } catch (erroMensagem) {
                erroDiv.innerText = erroMensagem;
                erroDiv.style.display = 'block';
            }
        }
    </script>

</body>
</html>
